version: '3.8'

services:
  # ==========================================
  # System A (Web 主系统 - 使用默认 veludo_db)
  # ==========================================
  system_a:
    build: .
    container_name: veludo_system_a
    restart: always
    # 👇 这里的 env_file 读取到的 DB_NAME 现在是 veludo_db
    env_file:
      - .env
    command: >
      sh -c "if [ '$DEBUG' = 'True' ]; then
               echo '🟢 Local Mode: Starting runserver...';
               python system_a_veludo/manage.py runserver 0.0.0.0:8000;
             else
               echo '🚀 Production Mode: Starting Gunicorn...';
               gunicorn config.wsgi:application --bind 0.0.0.0:8000 --chdir system_a_veludo --workers 2 --threads 2 --worker-class=gthread --timeout 60;
             fi"
    volumes:
      - .:/app
      - ./static_root:/app/static_root
      - ./media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          memory: 300M

  # ==========================================
  # System B (SaaS 子系统 - 强制 saas_db)
  # ==========================================
  system-b:
    build: .
    container_name: veludo-system-b
    restart: always
    env_file:
      - .env
    # 👇 关键：覆盖环境变量，强制指向 SaaS 专用库
    environment:
      - DB_NAME=saas_db
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: >
      sh -c "if [ '$DEBUG' = 'True' ]; then
               echo '🟢 Local Mode: Starting runserver...';
               python system_b_saas/manage.py runserver 0.0.0.0:8001;
             else
               echo '🚀 Production Mode: Starting Gunicorn...';
               gunicorn config.wsgi:application --bind 0.0.0.0:8001 --chdir system_b_saas --workers 2 --threads 2 --worker-class=gthread --access-logfile -;
             fi"
    volumes:
      - .:/app
      - ./static_root_saas:/app/static_root
      - ./media:/app/media
    ports:
      - "8001:8001"
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          memory: 300M

  # ==========================================
  # Worker (后台任务 - 强制 saas_db)
  # ==========================================
  worker:
    build: .
    container_name: veludo_worker
    restart: always
    working_dir: /app/system_b_saas
    command: celery -A config worker -l info -P solo
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    env_file:
      - .env
    # 👇 关键：Worker 也必须指向 SaaS 专用库
    environment:
      - DB_HOST=db
      - DB_NAME=saas_db
      - DJANGO_SETTINGS_MODULE=config.settings
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    deploy:
      resources:
        limits:
          memory: 250M

  # ==========================================
  # Database (PostgreSQL)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: veludo_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-veludo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    command: postgres -c 'shared_buffers=64MB' -c 'max_connections=50'
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_sql:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          memory: 200M

  # ==========================================
  # Redis
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: veludo_redis
    restart: always
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 50M

volumes:
  postgres_data:
