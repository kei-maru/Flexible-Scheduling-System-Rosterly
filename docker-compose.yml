version: '3.8'

services:
  # ==========================================
  # System A (Web 主系统)
  # ==========================================
  system_a:
    build: .
    container_name: veludo_system_a
    restart: always
    # 👇 限制工作线程，由 4 改为 2，省内存
    command: >
      sh -c "if [ '$DEBUG' = 'True' ]; then
               echo '🟢 Local Mode: Starting runserver...';
               python system_a_veludo/manage.py runserver 0.0.0.0:8000;
             else
               echo '🚀 Production Mode: Starting Gunicorn...';
               gunicorn config.wsgi:application --bind 0.0.0.0:8000 --chdir system_a_veludo --workers 2 --threads 2 --worker-class=gthread --timeout 60;
             fi"
    volumes:
      - .:/app
      - ./static_root:/app/static_root
      - ./media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    # 👇【关键】内存限制：超过 300M 就重启，防止拖死宿主机
    deploy:
      resources:
        limits:
          memory: 300M

  # ==========================================
  # 🆕 新增：Celery Worker (处理后台同步任务)
  # ==========================================
  worker:
    build: .
    container_name: veludo_worker
    restart: always
    # 👇 必须进入到 Django 项目目录
    working_dir: /app/system_a_veludo
    # 👇 --concurrency=1 是重点！1G内存只能允许单线程处理任务
    command: celery -A config worker -l info --concurrency=1
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    env_file:
      - .env
    # 👇 只要跑后台任务，给 200M 足够了
    deploy:
      resources:
        limits:
          memory: 200M

  # ==========================================
  # System B (SaaS 子系统)
  # ==========================================
  system-b:
    build: .
    container_name: veludo_system_b
    restart: always
    # 👇 同样减少线程数
    command: >
      sh -c "if [ '$DEBUG' = 'True' ]; then
               echo '🟢 Local Mode: Starting runserver...';
               python system_b_saas/manage.py runserver 0.0.0.0:8001;
             else
               echo '🚀 Production Mode: Starting Gunicorn...';
               gunicorn config.wsgi:application --bind 0.0.0.0:8001 --chdir system_b_saas --workers 2 --threads 2 --worker-class=gthread --access-logfile -;
             fi"
    volumes:
      - .:/app
      - ./static_root_saas:/app/static_root
      - ./media:/app/media
    ports:
      - "8001:8001"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - DB_NAME=saas_db
      - DB_HOST=db
    # 👇 SaaS 系统访问量小，限制更严格一点
    deploy:
      resources:
        limits:
          memory: 250M

  # ==========================================
  # Database (PostgreSQL)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: veludo_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-dev_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
      POSTGRES_DB: ${DB_NAME:-veludo_db}
    # 👇【优化】限制共享缓存和最大连接数，适应 1G 内存
    command: postgres -c 'shared_buffers=64MB' -c 'max_connections=50'
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_sql:/docker-entrypoint-initdb.d
    # 👇 数据库是内存大户，给它留点空间，但也别太多
    deploy:
      resources:
        limits:
          memory: 200M

  # ==========================================
  # Redis
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: veludo_redis
    restart: always
    ports:
      - "6379:6379"
    # 👇 Redis 很省内存，50M 足够处理任务队列
    deploy:
      resources:
        limits:
          memory: 50M

volumes:
  postgres_data:
  static_volume:
  media_volume: