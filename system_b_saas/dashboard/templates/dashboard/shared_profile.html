<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | System B</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
<header class="sticky top-0 z-20 border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
        <a href="{% url 'shared_home' %}" class="text-sm font-semibold tracking-wide text-slate-700">SYSTEM B PORTAL</a>
        <div class="flex items-center gap-2">
            <a href="{% url 'logout' %}" class="rounded-md border border-rose-200 bg-rose-50 px-3 py-2 text-xs text-rose-700 hover:bg-rose-100">Logout</a>
            <div class="relative group">
            <button class="flex items-center gap-2 rounded-full border border-slate-200 bg-white px-2 py-1 hover:bg-slate-50">
                {% if user_avatar_url %}
                <img src="{{ user_avatar_url }}" alt="avatar" class="h-8 w-8 rounded-full object-cover">
                {% else %}
                <span class="flex h-8 w-8 items-center justify-center rounded-full bg-slate-900 text-xs font-bold text-white">{{ user_initial }}</span>
                {% endif %}
                <i class="fa-solid fa-chevron-down text-xs text-slate-400"></i>
            </button>
            <div class="invisible absolute right-0 mt-2 w-40 rounded-md border border-slate-200 bg-white p-1 opacity-0 shadow-lg transition group-hover:visible group-hover:opacity-100">
                <a href="{% url 'logout' %}" class="block rounded px-3 py-2 text-sm text-rose-600 hover:bg-rose-50">Logout</a>
            </div>
            </div>
        </div>
    </div>
</header>

<main class="mx-auto max-w-6xl px-4 py-10">
    <div class="mb-6 flex flex-wrap gap-2">
        <a href="{% url 'shared_home' %}" class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm">主页</a>
        <a href="{% url 'shared_schedule' %}" class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm">排班管理</a>
        <a href="{% url 'shared_profile' %}" class="rounded-md border border-slate-900 bg-slate-900 px-3 py-2 text-sm text-white">个人信息管理</a>
        <a href="{% url 'shared_bookings' %}" class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm">预约一览</a>
        {% if is_admin %}
        <a href="{% url 'tenant_dashboard' %}" class="rounded-md border border-indigo-200 bg-indigo-50 px-3 py-2 text-sm text-indigo-700">管理员面板</a>
        {% endif %}
    </div>

    <section class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
        <h1 class="mb-1 text-2xl font-bold">个人信息管理</h1>
        <p class="mb-6 text-sm text-slate-500">逻辑参考 System A：可维护用户名、邮箱、Discord。</p>

        <form method="post" class="grid gap-4 md:grid-cols-2">
            {% csrf_token %}
            <div>
                <label class="mb-1 block text-xs text-slate-500">Username</label>
                <input type="text" name="username" value="{{ request.user.username }}" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm" required>
            </div>
            <div>
                <label class="mb-1 block text-xs text-slate-500">Email</label>
                <input type="email" name="email" value="{{ request.user.email|default:'' }}" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm">
            </div>
            <div class="md:col-span-2">
                <label class="mb-1 block text-xs text-slate-500">Discord ID</label>
                <input type="text" name="discord_id" value="{{ request.user.discord_id|default:'' }}" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm">
            </div>
            <div class="md:col-span-2 pt-2">
                <button type="submit" class="rounded-md bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-700">保存</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
