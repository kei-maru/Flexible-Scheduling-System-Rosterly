version: '3.8'

services:
  # System A
  system_a:
    build: .
    container_name: veludo_system_a
    restart: always
    # 👇【关键修改】加上 --chdir system_a_veludo，让它进入子目录
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --chdir system_a_veludo
    volumes:
      - .:/app
      - static_volume:/app/static_root
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env

  # System B
  system-b:
    build: .
    container_name: veludo_system_b
    restart: always
    # 👇【关键修改】同理，System B 也要进它的子目录
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8001 --chdir system_b_saas
    volumes:
      - .:/app
      - static_volume:/app/static_root
      - media_volume:/app/media
    ports:
      - "8001:8001"
    depends_on:
      - db
      - redis
    env_file:
      - .env

  # -----------------------------
  # Database
  # -----------------------------
  db:
    image: postgres:15-alpine
    container_name: veludo_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-dev_user}         # 读取 .env，如果没读到就用默认值
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
      POSTGRES_DB: ${DB_NAME:-veludo_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_sql:/docker-entrypoint-initdb.d

  # -----------------------------
  # Redis
  # -----------------------------
  redis:
    image: redis:7-alpine
    container_name: veludo_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  static_volume:
  media_volume: