<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Local Login | System B</title>
  <style>
    :root{--bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--dark:#0f172a;--dark2:#1e293b;--error:#be123c;--errorbg:#fff1f2}
    *{box-sizing:border-box} body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto;background:radial-gradient(circle at 15% 10%,rgba(2,6,23,.06),transparent 36%),var(--bg);color:var(--text)}
    .wrap{min-height:100vh;display:grid;place-items:center;padding:20px}
    .card{width:min(440px,100%);background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px;box-shadow:0 18px 50px -30px rgba(15,23,42,.4)}
    h1{margin:0 0 8px;font-size:24px}
    p{margin:0 0 16px;color:var(--muted);font-size:14px;line-height:1.6}
    label{display:block;margin-top:12px;margin-bottom:6px;color:var(--muted);font-size:12px}
    input[type="text"],input[type="password"]{width:100%;padding:10px 12px;border:1px solid #cbd5e1;border-radius:10px;font-size:14px}
    .remember{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:13px;color:#334155}
    button{margin-top:16px;width:100%;padding:12px;border:0;border-radius:10px;background:var(--dark);color:#fff;font-weight:700;font-size:14px;cursor:pointer}
    button:hover{background:var(--dark2)}
    .error{margin-top:12px;padding:10px 12px;border:1px solid #fecdd3;border-radius:10px;background:var(--errorbg);color:var(--error);font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>Local Account Login</h1>
      <p>用于本地账号密码测试。Discord 登录请使用 <code>/dashboard/login/</code>。</p>

      <form method="post" action="">
        {% csrf_token %}
        <label for="id_username">Username</label>
        <input id="id_username" type="text" name="username" autocomplete="username" required>

        <label for="id_password">Password</label>
        <input id="id_password" type="password" name="password" autocomplete="current-password" required>

        <label class="remember" for="id_remember">
          <input id="id_remember" type="checkbox" name="remember_me">
          <span>Remember me</span>
        </label>

        {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
        {% endif %}

        <button type="submit">Sign In</button>
      </form>

      {% if form.errors %}
      <div class="error">Invalid username or password.</div>
      {% endif %}
    </section>
  </div>
</body>
</html>
