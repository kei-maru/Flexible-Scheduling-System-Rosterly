{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Home | System B</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
    <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/90 backdrop-blur">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
            <a href="{% url 'shared_home' %}" class="text-sm font-semibold tracking-wide text-slate-700">SYSTEM B PORTAL</a>
            <div class="relative group">
                <button class="flex items-center gap-2 rounded-full border border-slate-200 bg-white px-2 py-1 hover:bg-slate-50">
                    {% if user_avatar_url %}
                    <img src="{{ user_avatar_url }}" alt="avatar" class="h-8 w-8 rounded-full object-cover">
                    {% else %}
                    <span class="flex h-8 w-8 items-center justify-center rounded-full bg-slate-900 text-xs font-bold text-white">{{ user_initial }}</span>
                    {% endif %}
                    <i class="fa-solid fa-chevron-down text-xs text-slate-400"></i>
                </button>
                <div class="invisible absolute right-0 mt-2 w-40 rounded-md border border-slate-200 bg-white p-1 opacity-0 shadow-lg transition group-hover:visible group-hover:opacity-100">
                    <a href="{% url 'logout' %}" class="block rounded px-3 py-2 text-sm text-rose-600 hover:bg-rose-50">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-10">
        <h1 class="mb-2 text-3xl font-bold">公共主页面</h1>
        <p class="mb-8 text-sm text-slate-500">登录后统一入口。请通过下方模块进入功能页面。</p>

        <div class="grid gap-4 md:grid-cols-3">
            <a href="{% url 'shared_schedule' %}" class="group rounded-xl border border-slate-200 bg-white p-6 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md">
                <div class="mb-3 flex h-10 w-10 items-center justify-center rounded-lg bg-amber-100 text-amber-700"><i class="fa-regular fa-calendar"></i></div>
                <h2 class="text-lg font-semibold">排班管理</h2>
                <p class="mt-2 text-sm text-slate-500">创建、调整、周期排班与模板管理。</p>
            </a>

            <a href="{% url 'shared_profile' %}" class="group rounded-xl border border-slate-200 bg-white p-6 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md">
                <div class="mb-3 flex h-10 w-10 items-center justify-center rounded-lg bg-emerald-100 text-emerald-700"><i class="fa-regular fa-user"></i></div>
                <h2 class="text-lg font-semibold">个人信息管理</h2>
                <p class="mt-2 text-sm text-slate-500">维护用户名、邮箱与 Discord 信息。</p>
            </a>

            <a href="{% url 'shared_bookings' %}" class="group rounded-xl border border-slate-200 bg-white p-6 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md">
                <div class="mb-3 flex h-10 w-10 items-center justify-center rounded-lg bg-sky-100 text-sky-700"><i class="fa-solid fa-list-check"></i></div>
                <h2 class="text-lg font-semibold">预约一览</h2>
                <p class="mt-2 text-sm text-slate-500">查看预约、操作完结与取消（按角色授权）。</p>
            </a>
        </div>

        {% if is_admin %}
        <div class="mt-8">
            <a href="{% url 'tenant_dashboard' %}" class="inline-flex items-center gap-2 rounded-md border border-indigo-200 bg-indigo-50 px-4 py-2 text-sm text-indigo-700 hover:bg-indigo-100">
                <i class="fa-solid fa-user-shield"></i> 管理员面板
            </a>
        </div>
        {% endif %}
    </main>
</body>
</html>
