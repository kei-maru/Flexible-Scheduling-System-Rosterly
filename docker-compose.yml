version: '3.8'

services:
  # ==========================================
  # System A (Veludo Main)
  # ==========================================
  system_a:
    build: .
    container_name: veludo_system_a
    restart: always
    # 👇【核心修改】智能启动脚本
    # 逻辑：如果 .env 里 DEBUG=True，就用 runserver (解决本地图片/CSS不显示问题)
    #      如果 DEBUG=False，就用 gunicorn (服务器高性能模式)
    command: >
      sh -c "if [ '$DEBUG' = 'True' ]; then
               echo '🟢 Local Mode: Starting runserver...';
               python system_a_veludo/manage.py runserver 0.0.0.0:8000;
             else
               echo '🚀 Production Mode: Starting Gunicorn...';
               gunicorn config.wsgi:application --bind 0.0.0.0:8000 --chdir system_a_veludo --workers 2 --worker-class=gthread --threads 4;
             fi"
    volumes:
      - .:/app
      - ./static_root:/app/static_root
      - ./media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env

  # ==========================================
  # System B (SaaS)
  # ==========================================
  system-b:
    build: .
    container_name: veludo_system_b
    restart: always
    # 👇【核心修改】System B 同理，支持智能切换
    command: >
      sh -c "if [ '$DEBUG' = 'True' ]; then
               echo '🟢 Local Mode: Starting runserver...';
               python system_b_saas/manage.py runserver 0.0.0.0:8001;
             else
               echo '🚀 Production Mode: Starting Gunicorn...';
               gunicorn config.wsgi:application --bind 0.0.0.0:8001 --chdir system_b_saas --workers 2 --worker-class=gthread --threads 4;
             fi"
    volumes:
      - .:/app
      - ./static_root_saas:/app/static_root
      - ./system_a_veludo/media:/app/media
    ports:
      - "8001:8001"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    # 👇【关键配置】强制覆盖环境变量，确保连对数据库
    environment:
      - DB_NAME=saas_db
      - DB_HOST=db
      # 注意：如果 .env 里的 USER/PASSWORD 对 saas_db 不适用，请取消下面注释并修改
      # - DB_USER=dev_user
      # - DB_PASSWORD=dev_password

  # ==========================================
  # Database (PostgreSQL)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: veludo_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-dev_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
      POSTGRES_DB: ${DB_NAME:-veludo_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_sql:/docker-entrypoint-initdb.d
    # 👇【可选优化】限制内存（建议在服务器上打开，本地开发可以注释掉）
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M

  # ==========================================
  # Redis
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: veludo_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  static_volume:
  media_volume: