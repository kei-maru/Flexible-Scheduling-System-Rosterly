{% load i18n %}
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>System B Login</title>
  <style>
    :root{--bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--dark:#111827;--dark2:#1f2937}
    *{box-sizing:border-box} body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto;background:var(--bg);color:var(--text)}
    .wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
    .card{width:min(460px,100%);background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px;box-shadow:0 18px 40px -24px rgba(15,23,42,.35)}
    h1{margin:0 0 12px;font-size:24px}.sub{margin:0 0 20px;color:var(--muted);font-size:14px}
    label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px}
    input{width:100%;padding:10px 12px;border:1px solid #cbd5e1;border-radius:10px;font-size:14px}
    button{margin-top:18px;width:100%;padding:12px;border-radius:10px;border:0;background:var(--dark);color:#fff;font-weight:700;cursor:pointer}
    button:hover{background:var(--dark2)}
    .err{margin-top:12px;padding:10px 12px;border:1px solid #fecdd3;border-radius:10px;background:#fff1f2;color:#be123c;font-size:13px}
  </style>
</head>
<body>
<div class="wrap">
  <section class="card">
    <h1>Local Test Login</h1>
    <p class="sub">用于未配置 Discord 时的本地账号测试。</p>

    <form method="post" action="{% url 'account_login' %}">
      {% csrf_token %}
      <label>{% trans "Username" %}</label>
      <input type="text" name="login" autocomplete="username" required>
      <label>{% trans "Password" %}</label>
      <input type="password" name="password" autocomplete="current-password" required>
      <button type="submit">Sign In</button>
    </form>

    {% if form.errors %}
    <div class="err">Invalid username or password.</div>
    {% endif %}
  </section>
</div>
</body>
</html>
