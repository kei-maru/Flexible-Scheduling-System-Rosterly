version: '3.8'

services:
  # ==========================================
  # System A (Web 主系统 - 前端/客户端)
  # ==========================================
  system_a:
    build: .
    container_name: veludo_system_a
    restart: always
    command: >
      sh -c "if [ '$DEBUG' = 'True' ]; then
               echo '🟢 Local Mode: Starting runserver...';
               python system_a_veludo/manage.py runserver 0.0.0.0:8000;
             else
               echo '🚀 Production Mode: Starting Gunicorn...';
               gunicorn config.wsgi:application --bind 0.0.0.0:8000 --chdir system_a_veludo --workers 2 --threads 2 --worker-class=gthread --timeout 60;
             fi"
    volumes:
      - .:/app
      - ./static_root:/app/static_root
      - ./media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 300M

  # ==========================================
  # System B (SaaS 子系统 - 后端/API)
  # ==========================================
  system-b:
    build: .
    container_name: veludo-system-b
    restart: always
    command: >
      sh -c "if [ '$DEBUG' = 'True' ]; then
               echo '🟢 Local Mode: Starting runserver...';
               python system_b_saas/manage.py runserver 0.0.0.0:8001;
             else
               echo '🚀 Production Mode: Starting Gunicorn...';
               gunicorn config.wsgi:application --bind 0.0.0.0:8001 --chdir system_b_saas --workers 2 --threads 2 --worker-class=gthread --access-logfile -;
             fi"
    volumes:
      - .:/app
      - ./static_root_saas:/app/static_root
      - ./media:/app/media
    ports:
      - "8001:8001"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - DB_NAME=saas_db
      - DB_HOST=db
      # 👇 告诉 System B Redis 在哪里 (Docker内部名)
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    deploy:
      resources:
        limits:
          memory: 300M

  # ==========================================
  # Worker (后台任务 - 邮件/Webhook)
  # ==========================================
  worker:
    build: .
    container_name: veludo_worker
    restart: always
    # 👇【关键修正】你的任务代码在 System B，所以必须指向 System B 的目录
    working_dir: /app/system_b_saas
    # 👇 启动 Celery，加载 config (对应 system_b_saas/config)
    command: celery -A config worker -l info -P solo
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_NAME=saas_db
      # 👇 确保 Django 加载的是 System B 的 settings
      - DJANGO_SETTINGS_MODULE=config.settings
      # 👇 告诉 Worker Redis 在哪里
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    deploy:
      resources:
        limits:
          memory: 250M

  # ==========================================
  # Database (PostgreSQL)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: veludo_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-dev_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
      POSTGRES_DB: ${DB_NAME:-veludo_db}
    command: postgres -c 'shared_buffers=64MB' -c 'max_connections=50'
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_sql:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          memory: 200M

  # ==========================================
  # Redis (缓存 & 消息队列)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: veludo_redis
    restart: always
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 50M

volumes:
  postgres_data:
  static_volume:
  media_volume: