version: '3.8'

services:
  # ==========================================
  # Database (核心数据库 - 服务于 A 和 B)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: veludo_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-dev_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
      # 不指定 DB_NAME，方便恢复所有数据库
    # 👇【性能解放】ARM 12GB 专属优化
    # shared_buffers=2GB: 给数据库分配 2GB 内存做缓存
    # max_connections=200: 允许 System A 和 B 同时发起大量连接
    command: postgres -c 'shared_buffers=2GB' -c 'max_connections=200' -c 'work_mem=16MB'
    ports:
      # 👇【关键】开放端口给 Server A 远程连接
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_sql:/docker-entrypoint-initdb.d

  # ==========================================
  # Redis (核心缓存)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: veludo_redis
    restart: always
    ports:
      # 👇【关键】开放端口给 Server A 远程连接
      - "6379:6379"

  # ==========================================
  # System B (SaaS 子系统 - 后端核心)
  # ==========================================
  system-b:
    build: .
    container_name: veludo-system-b
    restart: always
    # 👇【性能解放】4 workers, 4 threads (适配 ARM 多核)
    command: >
      sh -c "if [ '$DEBUG' = 'True' ]; then
               echo '🟢 Local Mode: Starting runserver...';
               python system_b_saas/manage.py runserver 0.0.0.0:8001;
             else
               echo '🚀 Production Mode: Starting Gunicorn...';
               gunicorn config.wsgi:application --bind 0.0.0.0:8001 --chdir system_b_saas --workers 4 --threads 4 --worker-class=gthread --access-logfile -;
             fi"
    volumes:
      - .:/app
      - ./static_root_saas:/app/static_root
      - ./media:/app/media
    ports:
      - "8001:8001"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      # 内部直连
      - DB_NAME=saas_db
      - DB_HOST=db
      - DB_PORT=5432

  # ==========================================
  # Worker (专门处理 System B 的邮件任务)
  # ==========================================
  worker:
    build: .
    container_name: veludo_worker
    restart: always
    # 👇【关键修正】指向 System B 的代码目录，因为邮件逻辑在这里
    working_dir: /app/system_b_saas
    # 👇【性能解放】移除 concurrency 限制，火力全开
    command: celery -A config worker -l info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      # 确保 Worker 加载的是 System B 的配置
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0

volumes:
  postgres_data:
  static_volume:
  media_volume: